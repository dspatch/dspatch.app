name: dspatch_app
description: "d:spatch — Agent Orchestration Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.11.1
  dspatch_sdk:
    path: packages/dspatch_sdk
  dspatch_ui:
    path: packages/dspatch_ui
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.0
  window_manager: ^0.4.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  file_picker: ^8.1.6
  flutter_markdown: ^0.7.6
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.70.2
  re_editor: ^0.7.0
  re_highlight: ^0.0.3
  qr_flutter: ^4.1.0
  flutter_lucide: ^1.8.2
  cryptography: ^2.7.0
  path: ^1.9.0
  watcher: ^1.1.0
  yaml: ^3.1.0
  http: ^1.3.0
  web_socket_channel: ^3.0.0
  uuid: ^4.5.1
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5
  drift_dev: ^2.24.0
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/docker/runtime/

msix_config:
  display_name: dspatch
  publisher_display_name: oakisnotree
  identity_name: com.oakisnotree.dspatch
  msix_version: 0.1.0.0
