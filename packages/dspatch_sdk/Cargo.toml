[package]
name = "dspatch_sdk"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
description = "d:spatch SDK — core library for the d:spatch agent platform"

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ["cfg(frb_expand)"]

[lib]
name = "dspatch_sdk"
crate-type = ["cdylib", "staticlib", "lib"]

[[bin]]
name = "dspatch-cli"
path = "src/bin/dspatch.rs"

[features]
default = []
flutter = ["dep:flutter_rust_bridge"]

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Database
rusqlite = { version = "0.31", features = ["bundled", "column_decltype", "hooks"] }
async-stream = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Web / networking
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
reqwest = { version = "0.12", features = ["json"] }
tokio-tungstenite = "0.26"

# Crypto
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
x25519-dalek = { version = "2", features = ["static_secrets"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }

# CLI
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
rpassword = "5"

# Identifiers & time
uuid = { version = "1", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging / tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Regex (lightweight, no-std compatible)
regex-lite = "0.1"
once_cell = "1"

# Encoding & secrets
base64 = "0.22"
hex = "0.4"

# Filesystem
tempfile = "3"
notify = "6"
hostname = "0.4"
dirs = "5"

# Flutter bridge (optional)
flutter_rust_bridge = { version = "=2.11.1", features = ["chrono"], optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3", features = ["apple-native"] }

[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3", features = ["linux-native"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
