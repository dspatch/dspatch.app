[package]
name = "dspatch_engine"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
description = "dspatch engine — standalone daemon and mobile shared library for the dspatch agent platform"

[lib]
name = "dspatch_engine"
crate-type = ["lib", "cdylib"]

[[bin]]
name = "dspatch-engine"
path = "src/bin/dspatch_engine.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"
tokio-util = { version = "0.7", features = ["rt"] }
async-trait = "0.1"

# Database
rusqlite = { version = "0.31", features = ["bundled", "column_decltype", "hooks"] }
async-stream = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Web / networking
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
reqwest = { version = "0.12", features = ["json"] }
tokio-tungstenite = "0.26"

# Crypto
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.9"
x25519-dalek = { version = "2", features = ["static_secrets"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }

# Signal Protocol — official implementation from signalapp/libsignal
# Not published to crates.io; must use git dependency.
# Requires cmake + C compiler for BoringSSL (boring crate).
libsignal-protocol = { git = "https://github.com/signalapp/libsignal", branch = "main" }

# Identifiers & time
uuid = { version = "1", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging / tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Regex (lightweight, no-std compatible)
regex-lite = "0.1"
once_cell = "1"

# Encoding & secrets
base64 = "0.22"
hex = "0.4"

# Filesystem
tempfile = "3"
notify = "6"
hostname = "0.4"
dirs = "5"

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3", features = ["apple-native"] }

[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3", features = ["linux-native"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
http = "1"
